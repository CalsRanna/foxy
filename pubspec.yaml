name: foxy
description: "AzerothCore 数据库可视化管理工具 — 管理生物、物品、任务、法术等游戏数据。"
publish_to: "none"
version: 1.0.0+562

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  auto_route: ^10.2.0
  get_it: ^9.0.5
  laconic: ^3.0.0
  laconic_mysql: ^3.0.0
  logger: ^2.4.0
  lucide_icons_flutter: ^3.1.14
  meta: ^1.17.0
  package_info_plus: ^9.0.0
  path: ^1.9.1
  shadcn_ui: ^0.55.0
  shared_preferences: ^2.3.5
  signals: ^6.0.2
  signals_flutter: ^6.0.2
  url_launcher: ^6.3.1
  window_manager: ^0.5.1
  yaml: ^3.1.3
  yaml_edit: ^2.2.2
  warcrafty: ^1.0.2
  file_selector: ^1.1.0

  collection: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  auto_route_generator: ^10.2.5
  analyzer: ^8.1.1
  build: ^3.1.0
  build_runner: ^2.4.9
  build_test: ^3.3.2
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0
  source_gen: ^3.1.0
  test: ^1.30.0

flutter:
  uses-material-design: true

  assets:
    - asset/image/
