name: foxy
version: 1.0.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-foxy: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.foxy # adjust accordingly to your app name

apps:
  foxy:
    command: foxy
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-foxy
parts:
  foxy:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
